version: '3.8'

services:
  signaling:
    build: .
    container_name: videocall-signaling
    ports:
      - "${SIGNALING_PORT:-8080}:8080"
    environment:
      - SIGNALING_PORT=8080
      - NODE_ENV=production
      - SIGNALING_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - videocall-network

networks:
  videocall-network:
    driver: bridge

